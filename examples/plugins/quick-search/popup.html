<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #101828;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        gap: 12px;
        padding: 14px;
      }

      .text {
        min-height: 58px;
        overflow: hidden;
        border: 1px solid #d0d5dd;
        padding: 10px;
        font-size: 12px;
        line-height: 1.4;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        height: 32px;
        border: 1px solid #0f766e;
        background: #0f766e;
        color: #ffffff;
        padding: 0 10px;
        font-size: 12px;
        cursor: pointer;
      }

      button.secondary {
        border-color: #d0d5dd;
        background: #ffffff;
        color: #344054;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="text" id="selected"></div>
      <div class="actions">
        <button id="search">Search</button>
        <button class="secondary" id="close">Close</button>
      </div>
    </main>
    <script>
      const selectedText = window.ohMySelect.context.selectedText || "";
      const defaultEngine = "https://www.google.com/search?q=";

      document.getElementById("selected").textContent = selectedText;
      document.getElementById("search").addEventListener("click", async () => {
        const storedEngine = await window.ohMySelect.storage.get("engine");
        const engine =
          typeof storedEngine === "string" && storedEngine.length > 0
            ? storedEngine
            : defaultEngine;

        await window.ohMySelect.openExternal(
          `${engine}${encodeURIComponent(selectedText)}`,
        );
        await window.ohMySelect.closePopup();
      });
      document.getElementById("close").addEventListener("click", () => {
        window.ohMySelect.closePopup();
      });
    </script>
  </body>
</html>
