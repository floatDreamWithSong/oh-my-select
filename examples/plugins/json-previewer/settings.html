<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #101828;
        background: #ffffff;
      }

      main {
        display: grid;
        gap: 14px;
        padding: 24px;
        max-width: 420px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        width: 120px;
        height: 34px;
        border: 1px solid #d0d5dd;
        border-radius: 4px;
        padding: 0 10px;
        font: inherit;
      }

      input:focus,
      button:focus {
        outline: 2px solid #99f6e4;
        outline-offset: 2px;
      }

      .hint {
        margin: -8px 0 0;
        color: #475467;
        font-size: 12px;
        line-height: 1.5;
      }

      button {
        width: fit-content;
        height: 32px;
        border: 1px solid #0f766e;
        border-radius: 4px;
        background: #0f766e;
        color: #ffffff;
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: #115e59;
      }

      #status {
        min-height: 18px;
        margin: 0;
        color: #0f766e;
        font-size: 13px;
        line-height: 1.4;
      }

      #status.error {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">JSON Previewer Settings</h1>
      <label for="indent">
        <span id="indent-label">Indent size (0-8 spaces)</span>
        <input id="indent" type="number" min="0" max="8" step="1" />
      </label>
      <p id="hint" class="hint">
        Controls how many spaces are used when previewing formatted JSON.
      </p>
      <button id="save" type="button">Save</button>
      <p id="status" aria-live="polite"></p>
    </main>
    <script src="./json-core.js"></script>
    <script>
      const host = window.ohMySelect
      const core = window.ohMySelectJsonCore
      const locale = host.context?.locale === "zh-CN" ? "zh-CN" : "en"
      const messages = {
        en: {
          title: "JSON Previewer Settings",
          label: "Indent size (0-8 spaces)",
          hint: "Controls how many spaces are used when previewing formatted JSON.",
          save: "Save",
          saved: "Saved",
          invalid: "Enter an integer from 0 to 8",
          saveFailed: "Could not save settings",
        },
        "zh-CN": {
          title: "JSON 预览器设置",
          label: "缩进大小（0-8 个空格）",
          hint: "控制预览格式化 JSON 时使用的空格数。",
          save: "保存",
          saved: "已保存",
          invalid: "请输入 0 到 8 的整数",
          saveFailed: "设置保存失败",
        },
      }
      const copy = messages[locale]

      const title = document.getElementById("title")
      const indentLabel = document.getElementById("indent-label")
      const hint = document.getElementById("hint")
      const input = document.getElementById("indent")
      const saveButton = document.getElementById("save")
      const status = document.getElementById("status")

      title.textContent = copy.title
      indentLabel.textContent = copy.label
      hint.textContent = copy.hint
      saveButton.textContent = copy.save

      input.value = String(core.DEFAULT_INDENT)
      host.storage
        .get("indentSize")
        .then((value) => {
          input.value = String(core.indentOrDefault(value))
        })
        .catch(() => {
          input.value = String(core.DEFAULT_INDENT)
        })

      saveButton.addEventListener("click", () => {
        const indentSize = core.normalizeIndent(input.value)
        if (indentSize === null) {
          setStatus(copy.invalid, true)
          return
        }

        host.storage
          .set("indentSize", indentSize)
          .then(() => {
            setStatus(copy.saved, false)
          })
          .catch(() => {
            setStatus(copy.saveFailed, true)
          })
      })

      function setStatus(message, isError) {
        status.textContent = message
        status.classList.toggle("error", isError)
      }
    </script>
  </body>
</html>
