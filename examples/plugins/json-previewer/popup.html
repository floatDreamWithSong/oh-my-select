<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #020617;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        gap: 10px;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        padding: 12px;
      }

      .summary {
        display: grid;
        min-width: 0;
        gap: 5px;
      }

      .eyebrow,
      .source-label,
      .source-meta {
        margin: 0;
        color: #475569;
        font-size: 11px;
        line-height: 1.25;
      }

      .eyebrow {
        color: #0f172a;
        font-weight: 800;
        text-transform: uppercase;
      }

      .source-label {
        font-weight: 700;
      }

      .source {
        margin: 0;
        overflow: hidden;
        color: #020617;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .preview {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        border: 1px solid #d7dee8;
        background: #ffffff;
      }

      pre {
        margin: 0;
        padding: 10px;
      }

      code {
        color: #334155;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre;
      }

      .json-key {
        color: #0f766e;
        font-weight: 650;
      }

      .json-string {
        color: #15803d;
      }

      .json-number {
        color: #7c3aed;
      }

      .json-boolean {
        color: #b45309;
      }

      .json-null {
        color: #be123c;
      }

      .json-colon,
      .json-punctuation {
        color: #94a3b8;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        display: inline-flex;
        min-height: 32px;
        min-width: 0;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        padding: 0 8px;
      }

      button:hover {
        border-color: #0369a1;
        color: #0369a1;
      }

      button:focus-visible {
        outline: 2px solid #0369a1;
        outline-offset: 1px;
      }

      button svg {
        flex: 0 0 auto;
      }

      .button-label {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .status {
        min-height: 16px;
        margin: 0;
        color: #0f766e;
        font-size: 12px;
        line-height: 1.3;
      }

      .error {
        min-height: 100vh;
        align-content: center;
        gap: 12px;
        padding: 16px;
      }

      .error-title {
        margin: 0;
        color: #020617;
        font-size: 16px;
        font-weight: 750;
      }

      .error button {
        width: fit-content;
        min-width: 82px;
        padding: 0 12px;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="./json-core.js"></script>
    <script>
      const {
        DEFAULT_INDENT,
        formatObject,
        highlightJson,
        indentOrDefault,
        parseJsonObjectSelection,
        serializeObject,
      } = window.ohMySelectJsonCore;
      const host = window.ohMySelect || {
        context: {
          selectedText: '{"name":"oh-my-select"}',
          locale: "en",
        },
        closePopup() {
          return Promise.resolve();
        },
        storage: {
          get() {
            return Promise.resolve(DEFAULT_INDENT);
          },
        },
      };

      const labels = {
        en: {
          title: "JSON Previewer",
          source: "Source",
          sourceKind: "Source kind",
          unsupported: "Unsupported JSON object",
          close: "Close",
          copied: "Copied",
          copyFailed: "Copy failed",
          preview: "Preview",
          copyDeserialized: "Copy deserialized JSON",
          copySerialized: "Copy serialized JSON",
          sourceKinds: {
            object: "JSON object",
            "serialized-string": "Serialized JSON string",
          },
        },
        "zh-CN": {
          title: "JSON 预览器",
          source: "原始值",
          sourceKind: "来源类型",
          unsupported: "不支持的 JSON 对象",
          close: "关闭",
          copied: "已复制",
          copyFailed: "复制失败",
          preview: "预览",
          copyDeserialized: "复制反序列化 JSON",
          copySerialized: "复制序列化 JSON",
          sourceKinds: {
            object: "JSON 对象",
            "serialized-string": "序列化 JSON 字符串",
          },
        },
      };

      const locale =
        host.context && host.context.locale === "zh-CN" ? "zh-CN" : "en";
      const t = labels[locale];
      const selectedText =
        typeof host.context?.selectedText === "string"
          ? host.context.selectedText.trim()
          : "";
      const result = parseJsonObjectSelection(selectedText);
      const app = document.getElementById("app");

      document.documentElement.lang = locale;

      if (!result) {
        renderError();
      } else {
        renderJson();
      }

      function renderError() {
        app.className = "error";
        app.innerHTML = `
          <p class="error-title">${escapeHtml(t.unsupported)}</p>
          <button type="button" id="close">${escapeHtml(t.close)}</button>
        `;
        document.getElementById("close").addEventListener("click", () => {
          host.closePopup();
        });
      }

      async function renderJson() {
        const indent = await readIndent();
        const formatted = formatObject(result.object, indent);
        const serialized = serializeObject(result.object);
        const sourceKind =
          t.sourceKinds[result.sourceKind] || result.sourceKind;

        app.innerHTML = `
          <section class="summary" aria-label="${escapeAttribute(t.title)}">
            <p class="eyebrow">${escapeHtml(t.title)}</p>
            <p class="source-label">${escapeHtml(t.source)}</p>
            <p class="source" title="${escapeAttribute(
              result.sourceText
            )}">${escapeHtml(result.sourceText)}</p>
            <p class="source-meta">${escapeHtml(
              t.sourceKind
            )}: ${escapeHtml(sourceKind)}</p>
          </section>
          <section class="preview" aria-label="${escapeAttribute(
            t.preview
          )}" tabindex="0">
            <pre><code>${highlightJson(formatted)}</code></pre>
          </section>
          <section class="actions">
            <button type="button" data-copy="deserialized">
              ${copyIcon()}
              <span class="button-label">${escapeHtml(
                t.copyDeserialized
              )}</span>
            </button>
            <button type="button" data-copy="serialized">
              ${copyIcon()}
              <span class="button-label">${escapeHtml(t.copySerialized)}</span>
            </button>
          </section>
          <p class="status" id="status" aria-live="polite"></p>
        `;

        document
          .querySelector('[data-copy="deserialized"]')
          .addEventListener("click", () => {
            copyValue(formatted);
          });
        document
          .querySelector('[data-copy="serialized"]')
          .addEventListener("click", () => {
            copyValue(serialized);
          });
      }

      async function readIndent() {
        try {
          return indentOrDefault(await host.storage?.get?.("indentSize"));
        } catch {
          return DEFAULT_INDENT;
        }
      }

      async function copyValue(value) {
        const copied = await writeClipboard(value);
        showStatus(copied ? t.copied : t.copyFailed);
      }

      function showStatus(message) {
        const status = document.getElementById("status");
        status.textContent = message;

        window.clearTimeout(showStatus.timeout);
        showStatus.timeout = window.setTimeout(() => {
          status.textContent = "";
        }, 1200);
      }

      async function writeClipboard(value) {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(value);
            return true;
          }
        } catch {
          return writeClipboardFallback(value);
        }

        return writeClipboardFallback(value);
      }

      function writeClipboardFallback(value) {
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();

        try {
          return document.execCommand("copy");
        } catch {
          return false;
        } finally {
          textarea.remove();
        }
      }

      function copyIcon() {
        return `
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"></rect>
            <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
          </svg>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
