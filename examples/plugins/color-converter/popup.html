<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #020617;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        gap: 10px;
        padding: 12px;
      }

      .preview {
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 12px;
        align-items: stretch;
      }

      .swatch {
        width: 82px;
        height: 82px;
        overflow: hidden;
        border: 1px solid #94a3b8;
        background-color: #ffffff;
        background-image:
          linear-gradient(45deg, #cbd5e1 25%, transparent 25%),
          linear-gradient(-45deg, #cbd5e1 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #cbd5e1 75%),
          linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
        background-position:
          0 0,
          0 8px,
          8px -8px,
          -8px 0;
        background-size: 16px 16px;
      }

      #swatch-color {
        width: 100%;
        height: 100%;
      }

      .summary {
        display: grid;
        min-width: 0;
        align-content: center;
        gap: 5px;
      }

      .eyebrow,
      .source-label,
      .source-meta {
        margin: 0;
        color: #475569;
        font-size: 11px;
        line-height: 1.25;
      }

      .eyebrow {
        font-weight: 800;
        text-transform: uppercase;
      }

      .source-label {
        font-weight: 700;
      }

      .source {
        margin: 0;
        overflow: hidden;
        color: #020617;
        font-size: 16px;
        font-weight: 750;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rows {
        display: grid;
        gap: 6px;
      }

      .row {
        display: grid;
        min-height: 38px;
        grid-template-columns: 54px minmax(0, 1fr) 30px 64px;
        gap: 7px;
        align-items: center;
        border: 1px solid #d7dee8;
        background: #ffffff;
        padding: 5px 6px;
      }

      .format {
        color: #0f172a;
        font-size: 11px;
        font-weight: 800;
      }

      .value {
        overflow: hidden;
        color: #334155;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-status {
        min-width: 0;
        overflow: hidden;
        color: #0f766e;
        font-size: 11px;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button {
        display: inline-flex;
        width: 30px;
        height: 30px;
        align-items: center;
        justify-content: center;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        cursor: pointer;
      }

      button:hover {
        border-color: #0369a1;
        color: #0369a1;
      }

      button:focus-visible {
        outline: 2px solid #0369a1;
        outline-offset: 1px;
      }

      .status {
        min-height: 16px;
        margin: 0;
        color: #475569;
        font-size: 12px;
        line-height: 1.3;
      }

      .error {
        min-height: 100vh;
        align-content: center;
        gap: 12px;
        padding: 16px;
      }

      .error-title {
        margin: 0;
        color: #020617;
        font-size: 16px;
        font-weight: 750;
      }

      .error button {
        width: fit-content;
        min-width: 82px;
        padding: 0 12px;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="./color-core.js"></script>
    <script>
      const { colorToCss, formatColorOutputs, parseColor } =
        window.ohMySelectColorCore;
      const host = window.ohMySelect || {
        context: {
          selectedText: "#22c55e",
          locale: "en",
        },
        closePopup() {
          return Promise.resolve();
        },
      };

      const labels = {
        en: {
          title: "Detected color",
          source: "Source",
          format: "Format",
          values: "Converted values",
          unsupported: "Unsupported color value",
          close: "Close",
          copied: "Copied",
          copyFailed: "Copy failed",
          copyValue(format) {
            return `Copy ${format} value`;
          },
        },
        "zh-CN": {
          title: "识别到颜色",
          source: "原始值",
          format: "格式",
          values: "转换结果",
          unsupported: "不支持的颜色值",
          close: "关闭",
          copied: "已复制",
          copyFailed: "复制失败",
          copyValue(format) {
            return `复制 ${format} 值`;
          },
        },
      };

      const locale =
        host.context && host.context.locale === "zh-CN" ? "zh-CN" : "en";
      const t = labels[locale];
      const selectedText =
        typeof host.context?.selectedText === "string"
          ? host.context.selectedText.trim()
          : "";
      const color = parseColor(selectedText);
      const app = document.getElementById("app");

      document.documentElement.lang = locale;

      if (!color) {
        renderError();
      } else {
        renderColor();
      }

      function renderError() {
        app.className = "error";
        app.innerHTML = `
          <p class="error-title">${escapeHtml(t.unsupported)}</p>
          <button type="button" id="close">${escapeHtml(t.close)}</button>
        `;
        document.getElementById("close").addEventListener("click", () => {
          host.closePopup();
        });
      }

      function renderColor() {
        const outputs = formatColorOutputs(color);
        const rows = [
          ["HEX", outputs.hex],
          ["RGB", outputs.rgb],
          ["HSL", outputs.hsl],
          ["OKLCH", outputs.oklch],
        ];

        app.innerHTML = `
          <section class="preview" aria-label="${escapeAttribute(t.title)}">
            <div class="swatch" aria-hidden="true">
              <div id="swatch-color"></div>
            </div>
            <div class="summary">
              <p class="eyebrow">${escapeHtml(t.title)}</p>
              <p class="source-label">${escapeHtml(t.source)}</p>
              <p class="source" title="${escapeAttribute(selectedText)}">${escapeHtml(
                selectedText
              )}</p>
              <p class="source-meta">${escapeHtml(t.format)}: ${escapeHtml(
                color.sourceFormat
              )}</p>
            </div>
          </section>
          <section class="rows" aria-label="${escapeAttribute(t.values)}">
            ${rows
              .map(
                ([format, value], index) => `
                  <div class="row">
                    <span class="format">${format}</span>
                    <span class="value" title="${escapeAttribute(value)}">${escapeHtml(
                      value
                    )}</span>
                    <button type="button" data-copy-index="${index}" aria-label="${escapeAttribute(
                      t.copyValue(format)
                    )}">
                      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                        <rect x="9" y="9" width="10" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"></rect>
                        <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
                      </svg>
                    </button>
                    <span class="row-status" data-row-status="${index}"></span>
                  </div>
                `
              )
              .join("")}
          </section>
          <p class="status" id="status" aria-live="polite"></p>
        `;

        document.getElementById("swatch-color").style.backgroundColor =
          colorToCss(color);
        document.querySelectorAll("[data-copy-index]").forEach((button) => {
          button.addEventListener("click", () => {
            const index = Number(button.getAttribute("data-copy-index"));
            copyValue(rows[index][1], index);
          });
        });
      }

      async function copyValue(value, rowIndex) {
        const copied = await writeClipboard(value);
        showStatus(copied ? t.copied : t.copyFailed, rowIndex);
      }

      function showStatus(message, rowIndex) {
        const status = document.getElementById("status");
        const rowStatus = document.querySelector(
          `[data-row-status="${rowIndex}"]`
        );

        document.querySelectorAll("[data-row-status]").forEach((element) => {
          element.textContent = "";
        });
        status.textContent = message;
        if (rowStatus) {
          rowStatus.textContent = message;
        }

        window.clearTimeout(showStatus.timeout);
        showStatus.timeout = window.setTimeout(() => {
          status.textContent = "";
          if (rowStatus) {
            rowStatus.textContent = "";
          }
        }, 1200);
      }

      async function writeClipboard(value) {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(value);
            return true;
          }
        } catch {
          return writeClipboardFallback(value);
        }

        return writeClipboardFallback(value);
      }

      function writeClipboardFallback(value) {
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();

        try {
          return document.execCommand("copy");
        } catch {
          return false;
        } finally {
          textarea.remove();
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
